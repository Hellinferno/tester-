packages:
  # Web applications
  - 'apps/*'
  # Backend services (FastAPI/Python; only the JS-facing ones declare package.json)
  - 'services/*'
  # Shared libraries
  - 'packages/*'

# pnpm 11 build-script approval (replaces onlyBuiltDependencies).
# esbuild only needs its native-binary install script; approve it so
# `pnpm install` doesn't fail on CI (Vercel) with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
